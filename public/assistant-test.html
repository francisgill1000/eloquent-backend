<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rezzy Assistant Tester</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0B121B;
      color: #fff;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 24px;
    }
    .card {
      width: 100%;
      max-width: 640px;
      background: #16202A;
      border: 1px solid rgba(255,255,255,0.05);
      border-radius: 16px;
      padding: 24px;
      display: flex;
      flex-direction: column;
    }
    h1 { margin: 0 0 6px; font-size: 22px; }
    .sub { color: #92adc9; font-size: 13px; margin-bottom: 16px; }
    .endpoint {
      background: #0a0f18;
      border: 1px solid rgba(255,255,255,0.05);
      border-radius: 10px;
      padding: 10px 12px;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 12px;
      color: #8fb8ff;
      margin-bottom: 12px;
      word-break: break-all;
    }
    .meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      font-size: 11px;
      color: #6d87a3;
      margin-bottom: 10px;
      flex-wrap: wrap;
    }
    .meta code {
      color: #a0c4ff;
      background: #0a0f18;
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 11px;
    }
    .loc-badge {
      font-size: 11px;
      padding: 3px 8px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.1);
    }
    .loc-badge.on   { color: #6ee7b7; border-color: rgba(110,231,183,0.3); }
    .loc-badge.off  { color: #fca5a5; border-color: rgba(252,165,165,0.3); }
    .loc-badge.pending { color: #fbbf24; border-color: rgba(251,191,36,0.3); }
    .chat {
      flex: 1;
      min-height: 360px;
      max-height: 60vh;
      overflow-y: auto;
      background: #0a0f18;
      border: 1px solid rgba(255,255,255,0.05);
      border-radius: 12px;
      padding: 14px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-bottom: 12px;
    }
    .msg {
      max-width: 85%;
      padding: 10px 12px;
      border-radius: 12px;
      line-height: 1.5;
      font-size: 14px;
      word-wrap: break-word;
    }
    .msg.user {
      align-self: flex-end;
      background: #2563eb;
      color: #fff;
      border-bottom-right-radius: 4px;
      white-space: pre-wrap;
    }
    .msg.assistant {
      align-self: flex-start;
      background: #1f2b3a;
      color: #e6edf5;
      border-bottom-left-radius: 4px;
    }
    .msg.assistant a {
      color: #8fb8ff;
      text-decoration: underline;
      text-underline-offset: 2px;
    }
    .msg.assistant a:hover { color: #b7d1ff; }
    .msg.error {
      align-self: stretch;
      background: #3a1d1d;
      color: #ffb4b4;
      font-size: 12px;
      text-align: center;
    }
    .msg.typing { color: #7e95b0; font-style: italic; }
    .empty {
      color: #4d6480;
      text-align: center;
      font-size: 13px;
      margin: auto 0;
    }
    form { display: flex; gap: 8px; }
    textarea {
      flex: 1;
      resize: none;
      min-height: 44px;
      max-height: 120px;
      padding: 12px 14px;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.08);
      background: #0a0f18;
      color: #fff;
      font-size: 14px;
      font-family: inherit;
      outline: none;
    }
    textarea:focus { border-color: #2563eb; }
    button {
      padding: 0 18px;
      border-radius: 10px;
      border: 0;
      background: #2563eb;
      color: #fff;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-small {
      background: transparent;
      color: #92adc9;
      border: 1px solid rgba(255,255,255,0.1);
      padding: 4px 10px;
      font-size: 11px;
      font-weight: 500;
      cursor: pointer;
      border-radius: 6px;
    }
    .btn-small:hover { background: rgba(255,255,255,0.05); }
  </style>
</head>
<body>
  <div class="card">
    <h1>Rezzy Assistant Tester</h1>
    <div class="sub">Text-based chat with the Rezzy AI assistant — with live shop search.</div>
    <div class="endpoint">POST <span id="endpoint-url">/api/assistant/chat</span></div>

    <div class="meta">
      <span>conversation_id: <code id="cid">—</code></span>
      <span class="loc-badge pending" id="loc-badge">location: pending</span>
      <span style="display:flex; gap:6px;">
        <button class="btn-small" type="button" id="loc-btn">Enable location</button>
        <button class="btn-small" type="button" id="reset-btn">New conversation</button>
      </span>
    </div>

    <div class="chat" id="chat">
      <div class="empty" id="empty-state">Say hi, or try: "find barber near me".</div>
    </div>

    <form id="chat-form">
      <textarea id="input" placeholder="Type a message… (Enter to send, Shift+Enter for newline)" autofocus></textarea>
      <button type="submit" id="send-btn">Send</button>
    </form>
  </div>

  <script>
    const API_URL = `${window.location.origin}/api/assistant/chat`;
    document.getElementById('endpoint-url').textContent = API_URL;

    const chatEl   = document.getElementById('chat');
    const inputEl  = document.getElementById('input');
    const formEl   = document.getElementById('chat-form');
    const sendBtn  = document.getElementById('send-btn');
    const cidEl    = document.getElementById('cid');
    const resetBtn = document.getElementById('reset-btn');
    const locBtn   = document.getElementById('loc-btn');
    const locBadge = document.getElementById('loc-badge');
    const emptyEl  = document.getElementById('empty-state');

    let conversationId = null;
    let userLat = null;
    let userLon = null;

    function setLocationBadge(state, text) {
      locBadge.className = `loc-badge ${state}`;
      locBadge.textContent = text;
    }

    function requestLocation({ silent = false } = {}) {
      if (!navigator.geolocation) {
        setLocationBadge('off', 'location: unsupported');
        return;
      }
      setLocationBadge('pending', 'location: requesting…');
      navigator.geolocation.getCurrentPosition(
        (pos) => {
          userLat = pos.coords.latitude;
          userLon = pos.coords.longitude;
          setLocationBadge('on', `location: ${userLat.toFixed(3)}, ${userLon.toFixed(3)}`);
        },
        (err) => {
          setLocationBadge('off', 'location: denied');
          if (!silent) addMessage('error', `Location error: ${err.message}`);
        },
        { enableHighAccuracy: false, timeout: 10000, maximumAge: 60000 }
      );
    }

    function clearEmpty() {
      if (emptyEl && emptyEl.parentNode) emptyEl.remove();
    }

    function escapeHtml(s) {
      return s
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function renderMarkdown(text) {
      // escape first, then convert [label](url) to safe anchors
      let html = escapeHtml(text);
      html = html.replace(/\[([^\]]+)\]\((https?:\/\/[^\s)]+)\)/g, (_m, label, url) => {
        const safeUrl = url.replace(/"/g, '%22');
        return `<a href="${safeUrl}" target="_blank" rel="noopener noreferrer">${label}</a>`;
      });
      return html.replace(/\n/g, '<br>');
    }

    function addMessage(role, text, { html = false } = {}) {
      clearEmpty();
      const el = document.createElement('div');
      el.className = `msg ${role}`;
      if (html) {
        el.innerHTML = renderMarkdown(text);
      } else {
        el.textContent = text;
      }
      chatEl.appendChild(el);
      chatEl.scrollTop = chatEl.scrollHeight;
      return el;
    }

    async function sendMessage(message) {
      const typingEl = addMessage('assistant typing', 'Thinking…');
      sendBtn.disabled = true;

      try {
        const body = {
          message,
          conversation_id: conversationId || undefined,
        };
        if (userLat !== null && userLon !== null) {
          body.lat = userLat;
          body.lon = userLon;
        }

        const res = await fetch(API_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
          body: JSON.stringify(body),
        });

        const data = await res.json().catch(() => ({}));
        typingEl.remove();

        if (!res.ok) {
          addMessage('error', data.message || `Request failed (${res.status})`);
          return;
        }

        if (data.conversation_id) {
          conversationId = data.conversation_id;
          cidEl.textContent = conversationId;
        }

        addMessage('assistant', data.reply || '(no reply)', { html: true });

        if (data.action === 'needs_location') {
          requestLocation();
        }
      } catch (err) {
        typingEl.remove();
        addMessage('error', `Network error: ${err.message}`);
      } finally {
        sendBtn.disabled = false;
        inputEl.focus();
      }
    }

    formEl.addEventListener('submit', (e) => {
      e.preventDefault();
      const text = inputEl.value.trim();
      if (!text) return;
      addMessage('user', text);
      inputEl.value = '';
      sendMessage(text);
    });

    inputEl.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        formEl.requestSubmit();
      }
    });

    resetBtn.addEventListener('click', () => {
      conversationId = null;
      cidEl.textContent = '—';
      chatEl.innerHTML = '';
      const emptyDiv = document.createElement('div');
      emptyDiv.className = 'empty';
      emptyDiv.textContent = 'Say hi, or try: "find barber near me".';
      chatEl.appendChild(emptyDiv);
      inputEl.focus();
    });

    locBtn.addEventListener('click', () => requestLocation());

    // Attempt silent location on load (will only succeed if previously granted)
    requestLocation({ silent: true });
  </script>
</body>
</html>
